x-payments-api: &payments-api-template
  build:
    dockerfile: ./Dockerfile
  depends_on:
    - redis
  deploy:
    resources:
      limits:
        cpus: "0.3"
        # memory: "161MB"
        memory: "70MB"
  networks:
    - backend
    - payment-processor
  environment:
    - PAYMENT_PROCESSOR_URL_DEFAULT=http://payment-processor-default:8080
    - PAYMENT_PROCESSOR_URL_FALLBACK=http://payment-processor-fallback:8080
    - PORT=3000
services:
  load-balancer:
    depends_on:
      - c1.payments.api
      - c2.payments.api
      - c3.payments.api
    image: nginx:latest
    ports:
      - "9999:9999"
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: "35MB"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend

  c1.payments.api:
    <<: *payments-api-template
  c2.payments.api:
    <<: *payments-api-template
  c3.payments.api:
    <<: *payments-api-template
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: "15MB"
  # c4.payments.api:
  #   <<: *payments-api-template

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    ports:
      - "5540:5540" 
    restart: unless-stopped
    depends_on:
      - redis 
    environment:
      - TZ=UTC
      - RI_REDIS_HOST=redis
    networks:
      - backend

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - db_data:/data
    command: redis-server --appendonly yes
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "100MB"
    networks:
      - backend
